# ReelMind Prometheus Configuration

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  scrape_timeout: 10s

rule_files:
  - /etc/prometheus/alerting_rules.yml

scrape_configs:
  # ─── ReelMind Services ────────────────────────────────────────────────────

  - job_name: "api-gateway"
    static_configs:
      - targets: ["host.docker.internal:8000"]
    metrics_path: /metrics

  - job_name: "retrieval-service"
    static_configs:
      - targets: ["host.docker.internal:8003"]
    metrics_path: /metrics

  - job_name: "ranking-service"
    static_configs:
      - targets: ["host.docker.internal:8004"]
    metrics_path: /metrics

  - job_name: "rl-optimizer"
    static_configs:
      - targets: ["host.docker.internal:8005"]
    metrics_path: /metrics

  - job_name: "feature-engine"
    static_configs:
      - targets: ["host.docker.internal:8002"]
    metrics_path: /metrics

  # ─── Infrastructure ───────────────────────────────────────────────────────

  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: "redis"
    static_configs:
      - targets: ["redis:6379"]
    metrics_path: /metrics
